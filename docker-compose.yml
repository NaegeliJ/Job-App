services:
  job-app:
    container_name: job-app
    build: .
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    labels:
      - traefik.enable=true
      - traefik.http.routers.job-app.rule=Host(`jobs.hermes.nageli.ch`)
      - traefik.http.routers.job-app.entrypoints=web
      - traefik.http.services.job-app.loadbalancer.server.port=8080
    networks:
      - hermes-net

networks:
  hermes-net:
    external: true
