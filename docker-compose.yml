services:
  job-app:
    container_name: job-app
    image: ghcr.io/meisdy/job-app:latest
    build: .
    network_mode: host
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - ./update.sh:/deploy/update.sh
    restart: unless-stopped
    command: sh -c "curl -fsSL https://raw.githubusercontent.com/Meisdy/Job-App/master/update.sh -o /deploy/update.sh 2>/dev/null || true; exec ./Job_App"
