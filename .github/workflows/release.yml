name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      # ── Docker image → ghcr.io ────────────────────────────────────────────
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          build-args: VERSION=${{ github.ref_name }}
          tags: |
            ghcr.io/meisdy/job-app:latest
            ghcr.io/meisdy/job-app:${{ github.ref_name }}

      # ── Windows exe (static, cross-compiled) ──────────────────────────────
      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y mingw-w64 unzip

      - name: Cross-compile static exe
        run: scripts/build-win.sh "${{ github.ref_name }}"

      - name: Assemble Windows zip
        run: |
          # Exe resolves config/ frontend/ relative to its own dir (argv[0]);
          # data/ is auto-created on first run. Ship templates only — never
          # api_keys.json or user_profile.md (secrets).
          DIST="Job_App"
          mkdir -p "$DIST/config"
          cp build-win/Job_App.exe "$DIST/"
          cp -r frontend "$DIST/"
          cp config/config_v2.json      "$DIST/config/"
          cp config/system_prompt.txt   "$DIST/config/"
          cp config/onboarding_prompt.txt "$DIST/config/"
          cp config/import_prompt.txt   "$DIST/config/"
          cp config/user_profile_template.md "$DIST/config/" 2>/dev/null || true
          zip -r "Job_App-${{ github.ref_name }}-win64.zip" "$DIST"

      # ── Single GitHub Release: notes + exe zip asset ──────────────────────
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          append_body: true
          files: Job_App-${{ github.ref_name }}-win64.zip
          body: |

            ---
            ## Windows
            Download **`Job_App-${{ github.ref_name }}-win64.zip`** below, unzip, run `Job_App.exe`.
            Set your API key in-app on first run. (The "Source code" archives are auto-generated — not the app.)

            ## Linux (Docker)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/Meisdy/Job-App/master/setup.sh | bash
            ```
            To pin this exact version instead of `latest`, see [MANUAL.md](https://github.com/Meisdy/Job-App/blob/master/MANUAL.md#docker-pinning-a-version).
