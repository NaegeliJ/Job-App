<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Master</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  
  <!-- CSS Variables & Base -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  
  <!-- Layout -->
  <link rel="stylesheet" href="/css/layouts/main.css">
  
  <!-- Component Styles -->
  <link rel="stylesheet" href="/css/components/header.css">
  <link rel="stylesheet" href="/css/components/sidebar.css">
  <link rel="stylesheet" href="/css/components/detail-panel.css">
  <link rel="stylesheet" href="/css/components/action-bar.css">
  <link rel="stylesheet" href="/css/components/modal.css">
  <link rel="stylesheet" href="/css/components/utilities.css">
  <link rel="stylesheet" href="/css/components/console.css">
  
  <!-- Feature Styles -->
  <link rel="stylesheet" href="/css/features/fit-assessment.css">
  <link rel="stylesheet" href="/css/features/fit-verdict.css">
  <link rel="stylesheet" href="/css/features/work-split.css">
  <link rel="stylesheet" href="/css/features/red-flags.css">
</head>
<body>

<header>
  <div class="logo">Job Master</div>
  <div class="status-dot-wrap">
    <div class="status-dot" id="status-dot"></div>
    <span id="status-label">—</span>
  </div>
<div class="search-group">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input class="search-input" id="search-input" type="text" placeholder="Search Job title, Company, or City...">
      <span class="search-hint">Ctrl + K</span>
      <button class="search-clear" id="search-clear" aria-label="Clear search">✕</button>
    </div>
    <button class="tool-btn scrape-btn" id="scrape-btn">⊕ Scrape Jobs</button>
    <button class="tool-btn" id="import-job-btn">⊕ Add Job manually</button>
    <button class="tool-btn fitcheck-btn" id="fitcheck-btn">🤖 Fit-Check</button>
    <div class="bulk-delete-wrap" style="position:relative">
      <button class="tool-btn" id="bulk-delete-btn">🗑 Clean up ▾</button>
      <div class="bulk-delete-menu" id="bulk-delete-menu"></div>
    </div>
  </div>
  <button class="tool-btn" id="tracker-btn" style="margin-left:auto">📋 Applied</button>
  <button class="tool-btn profile-btn" id="profile-btn">👤 Profile</button>
  <button class="tool-btn settings-btn" id="settings-btn">⚙ Settings</button>
  <span id="update-notice" class="update-notice" style="display:none"></span>
</header>

<div class="main">
  <div class="sidebar">
    <div class="sb-header">
      <span class="sb-label">Positions</span>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="filter-dropdown" id="filter-dropdown">
          <button id="filter-dropdown-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:4px;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em" aria-haspopup="listbox" aria-expanded="false" aria-label="Filter positions">⊞ ALL</button>
          <div class="filter-dropdown-menu" id="filter-dropdown-menu" role="listbox">
            <button class="filter-btn active" id="filter-all" data-filter="all">All</button>
            <button class="filter-btn" id="filter-strong" data-filter="strong">Strong</button>
            <button class="filter-btn" id="filter-decent" data-filter="decent">Decent</button>
            <button class="filter-btn" id="filter-experimental" data-filter="experimental">Experimental</button>
            <button class="filter-btn" id="filter-weak" data-filter="weak">Weak</button>
            <button class="filter-btn" id="filter-unseen" data-filter="unseen">New</button>
            <button class="filter-btn" id="filter-interested" data-filter="interested">Starred</button>
            <button class="filter-btn" id="filter-applied" data-filter="applied">Applied</button>
          </div>
        </div>
        <button id="sort-btn" style="background:transparent;border:1px solid var(--border2);color:var(--text3);font-family:'JetBrains Mono',monospace;font-size:9px;padding:2px 8px;border-radius:4px;cursor:pointer;transition:all 0.15s;letter-spacing:0.04em" title="Toggle sort">⇅ SCORE</button>
        <span class="sb-count" id="list-count">—</span>
      </div>
    </div>
    <div class="sb-scroll" id="job-list">
      <div class="ldw"><span class="ld">●</span><span class="ld">●</span><span class="ld">●</span></div>
    </div>
  </div>

  <div class="detail-panel">
    <div class="detail-scroll" id="detail-scroll">
      <div class="empty"><div class="empty-i">⌖</div><div class="empty-t">Select a position</div></div>
    </div>
    <div class="action-bar" id="action-bar" style="display:none">
      <button class="ab ai" id="btn-i" data-status="interested">✦ Star</button>
      <button class="ab aa" id="btn-a" data-status="applied">✓ Applied</button>
      <button class="ab as" id="btn-s" data-status="skipped">✕ Skip</button>
      <button class="ab ae" id="btn-e">🗑️ Delete</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="settings-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⚙ Settings</span>
      <button class="modal-close" id="modal-close" aria-label="Close settings">✕</button>
    </div>
    <div class="modal-body" id="settings-body">
      <div class="ldw"><span class="ld">●</span><span class="ld">●</span><span class="ld">●</span></div>
    </div>
    <div class="modal-footer">
      <span id="app-version" style="font-size:11px;color:var(--text3);margin-right:auto"></span>
      <button class="modal-cancel-btn" id="modal-cancel-btn">Cancel</button>
      <button class="modal-save-btn" id="modal-save-btn">Save & Reload Config</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="profile-overlay">
  <div class="modal modal--wide">
    <div class="modal-header">
      <span class="modal-title">👤 My Profile</span>
      <button class="modal-cancel-btn" id="profile-redo-btn" style="font-size:12px;padding:6px 14px;margin-left:auto;margin-right:8px">↺ Redo Onboarding</button>
      <button class="modal-close" id="profile-close" aria-label="Close profile">✕</button>
    </div>
    <div class="modal-body" style="padding:16px 20px">
      <textarea id="profile-text-body" class="profile-textarea" spellcheck="false"><div class="ldw"><span class="ld">●</span><span class="ld">●</span><span class="ld">●</span></div></textarea>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel-btn" id="profile-cancel-btn">Cancel</button>
      <button class="modal-save-btn" id="profile-save-btn">Save Profile</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="import-overlay">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">⊕ Import Job manually</span>
      <button class="modal-close" id="import-close" aria-label="Close import">✕</button>
    </div>
    <div class="modal-body" id="import-step-text">
      <p style="font-size:12px;color:var(--text3);margin-bottom:12px">Ctrl+A — Ctrl+C the job page, then paste below.</p>
      <textarea id="import-textarea" placeholder="Paste job posting text here..." style="width:100%;height:280px;resize:vertical;font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:10px"></textarea>
    </div>
    <div class="modal-body" id="import-step-url" style="display:none">
      <p style="font-size:13px;color:var(--text2);margin-bottom:8px">Job imported. Where did you find it?</p>
      <p style="font-size:11px;color:var(--text3);margin-bottom:12px">Optional — adds a link to the job listing.</p>
      <input id="import-url-input" type="url" class="cfg-input" placeholder="https://..." style="width:100%">
    </div>
    <div class="modal-footer" id="import-footer-text">
      <button class="modal-save-btn" id="import-btn">Import</button>
    </div>
    <div class="modal-footer" id="import-footer-url" style="display:none;gap:8px">
      <button class="modal-cancel-btn" id="import-url-skip-btn">Skip</button>
      <button class="modal-save-btn" id="import-url-save-btn">Save & Close</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="modal-overlay" id="confirm-overlay">
  <div class="modal" style="width:360px">
    <div class="modal-body" style="padding:20px 24px">
      <p id="confirm-message" style="font-size:13px;color:var(--text2);margin:0;line-height:1.6"></p>
    </div>
    <div class="modal-footer">
      <button class="modal-cancel-btn" id="confirm-cancel-btn">Cancel</button>
      <button class="modal-save-btn" id="confirm-ok-btn" style="background:rgba(248,113,113,0.15);border-color:rgba(248,113,113,0.4);color:#f87171">Delete</button>
    </div>
  </div>
</div>

<!-- JavaScript Modules -->
<script type="module" src="/js/main.js"></script>

</body>
</html>
